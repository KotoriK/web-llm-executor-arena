<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPipe Test Page</title>
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
  <h1>@mediapipe/tasks-genai Test Page</h1>
  <p>Testing Qwen2.5-0.5B-Instruct with TensorFlow Lite backend</p>
  
  <div id="status" class="status loading">Initializing...</div>
  
  <div id="info" class="info-box" style="display: none;">
    <h2>Runtime Information</h2>
    <dl id="runtime-info">
      <dt>Runtime:</dt>
      <dd id="runtime-name">-</dd>
      <dt>Version:</dt>
      <dd id="runtime-version">-</dd>
      <dt>Backend:</dt>
      <dd id="runtime-backend">-</dd>
            <dt>Backend:</dt>
      <dd id="backend">-</dd>
      <dt>WASM SIMD:</dt>
      <dd id="wasm-simd">-</dd>
      <dt>WebGPU:</dt>
      <dd id="webgpu">-</dd>
    </dl>
  </div>

  <h2>Console Log</h2>
  <div id="log" class="log"></div>

  <script type="module" src="./test.js"></script>
</body>
</html>
