<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web-LLM Test Page</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
    }
    .status {
      padding: 12px;
      margin: 15px 0;
      border-radius: 6px;
      font-weight: 500;
    }
    .status.ready { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .status.loading { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .info-box {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 6px;
      margin: 15px 0;
      border: 1px solid #dee2e6;
    }
    .info-box dt {
      font-weight: 600;
      margin-top: 8px;
      color: #495057;
    }
    .info-box dd {
      margin-left: 20px;
      color: #6c757d;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 8px;
    }
    .badge.success { background: #d4edda; color: #155724; }
    .badge.warning { background: #fff3cd; color: #856404; }
    .badge.error { background: #f8d7da; color: #721c24; }
    .log {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 15px;
      border-radius: 6px;
      margin: 15px 0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      max-height: 300px;
      overflow-y: auto;
    }
    .log-entry {
      margin: 2px 0;
    }
    .log-entry.info { color: #4fc3f7; }
    .log-entry.warn { color: #ffb74d; }
    .log-entry.error { color: #e57373; }
    .log-entry.success { color: #81c784; }
    h1 { color: #212529; }
    h2 { color: #495057; margin-top: 25px; }
  </style>
</head>
<body>
  <h1>@mlc-ai/web-llm Test Page</h1>
  <p>Testing Qwen2.5-0.5B-Instruct with TVM WebGPU/WASM backend</p>
  
  <div id="status" class="status loading">Initializing...</div>
  
  <div id="info" class="info-box" style="display: none;">
    <h2>Runtime Information</h2>
    <dl>
      <dt>Runtime:</dt>
      <dd id="runtime-name">-</dd>
      <dt>Version:</dt>
      <dd id="runtime-version">-</dd>
      <dt>Backend:</dt>
      <dd id="runtime-backend">-</dd>
      <dt>WebGPU:</dt>
      <dd id="webgpu-status">-</dd>
      <dt>GPU Info:</dt>
      <dd id="gpu-info">-</dd>
    </dl>
  </div>

  <h2>Console Log</h2>
  <div id="log" class="log"></div>

  <script type="module" src="./test.js"></script>
</body>
</html>
